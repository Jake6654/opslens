version: "3.8"

services:
  backend:
    # use Dockerfile inside spring-api
    build: ./spring-api
    container_name: opslens-backend
    ports:
      - "8080:8080"
    environment:
      DB_URL: ${DB_URL}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      API_KEY: ${API_KEY}
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/health || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 20

  frontend:
    # use Dockerfile insde frontend
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_URL: http://localhost:8080
    environment:
      API_INTERNAL_URL: ${API_INTERNAL_URL}
    container_name: opslens-frontend
    ports:
      - "3000:3000"
    depends_on:
      backend:
        condition: service_healthy
