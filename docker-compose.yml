version: "3.8"

services:
  backend:
    # use Dockerfile inside spring-api
    build: ./spring-api
    container_name: opslens-backend
    ports:
      - "8080:8080"
    environment:
      DB_URL: ${DB_URL}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      API_KEY: ${API_KEY}

  frontend:
    # use Dockerfile insde frontend
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_URL: http://backend:8080
    container_name: opslens-frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend
